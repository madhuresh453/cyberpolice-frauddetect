services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cybershield-backend
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      MONGODB_URI: ${MONGODB_URI}
      DB_NAME: ${DB_NAME:-cyber-police}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped
