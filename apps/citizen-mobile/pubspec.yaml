name: cybershield_citizen
description: CYBERSHIELD AI - Citizen Fraud Protection Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  # Navigation
  go_router: ^13.0.1
  # Networking
  dio: ^5.4.0
  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  # Firebase
  firebase_core: ^2.25.4
  firebase_messaging: ^14.7.15
  firebase_crashlytics: ^3.4.15
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
 
  avatar_glow: ^3.0.1
  # Device
  device_info_plus: ^9.1.2
  package_info_plus: ^5.0.1
  connectivity_plus: ^5.0.2
  permission_handler: ^11.3.0
  # Sensors
  sensors_plus: ^4.0.0
  # Audio
  # record: ^5.0.4
  audioplayers: ^5.2.1
  # Camera
  camera: ^0.10.5
  image_picker: ^1.0.7
  # Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.7
  encrypt: ^5.0.3
  crypto: ^3.0.3
  # Maps
  # mapbox_gl: ^0.16.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  # Notifications
  flutter_local_notifications: ^17.0.0
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  sqflite: ^2.3.2
  animated_text_kit: ^4.2.2
  flutter_tts: ^3.8.3
  screenshot: ^2.1.0
  # Offline
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  # Charts
  fl_chart: ^0.66.0
  # WebView
  webview_flutter: ^4.4.4
  # Background
  workmanager: ^0.5.2
  flutter_background_service: ^5.0.5
  # Biometric
  # biometric_storage: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  drift_dev: ^2.14.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/
    - assets/fonts/